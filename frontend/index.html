<input type="text" id="newsInput" placeholder="Enter news here">
<button onclick="checkNews()">Check News</button>

<p id="result"></p>
<script>
function checkNews() {
  const inputText = document.getElementById("newsInput").value;

  if (!inputText) {
    alert("Please enter news text");
    return;
  }

  document.getElementById("result").innerText = "Checking...";

  fetch("http://127.0.0.1:5000/predict", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      news: inputText
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("result").innerHTML =
      `<b>${data.prediction}</b><br>Confidence: ${data.confidence}`;
  })
  .catch(err => {
    document.getElementById("result").innerText = "Error connecting to backend";
  });
}
</script>
